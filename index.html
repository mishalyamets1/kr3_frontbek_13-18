<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Для Android -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Цвет темы для браузера -->
    <meta name="theme-color" content="#4285f4">

    <!-- Для iOS (иконка на домашний экран) -->
    <link rel="apple-touch-icon" href="icons/icon-152x152.png">

    <!-- Для iOS (статус бар) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Список дел (13-18)</title>
    <link rel="icon" href="icons/favicon.ico" sizes="16x16" type="image/ico">
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <style>
        body { max-width: 700px; margin: 40px auto; padding: 0 16px; }
        h1 { margin-bottom: 24px; }
        #tasks-list { list-style: none; padding: 0; margin-top: 20px; }
        #tasks-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            margin-bottom: 8px;
            background: #fff;
        }
        #tasks-list li.done span { text-decoration: line-through; color: #999; }
        .task-actions { display: flex; gap: 8px; }
        #offline-banner {
            display: none;
            background: #f0ad4e;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        #offline-banner.visible { display: block; }
    </style>
</head>
<body>
    <h1>Список дел — офлайн-приложение</h1>
    <div id="offline-banner">Нет подключения к интернету — работаем из кэша</div>

    <form id="task-form" class="row">
        <input class="col-9" type="text" id="task-input" placeholder="Введите задачу" required>
        <button class="col-3" type="submit">Добавить</button>
    </form>

    <ul id="tasks-list"></ul>

    <script src="app.js"></script>
</body>
</html>
